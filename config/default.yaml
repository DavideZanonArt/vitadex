project: vitadex
language: it
safe_mode: true
database: data/vitadex.sqlite
runtime:
  state_root: ~/.vitadex
  data_dir: ~/.vitadex/data
  memory_dir: ~/.vitadex/memory
  logs_dir: ~/.vitadex/logs
  workspace_dir: ~/.vitadex/workspace
separation:
  forbidden_contexts:
    - business repositories
    - business credentials
    - production systems
    - production credentials
  default_scope: private_life
user_style:
  language: Italian
  tone: direct, practical, concise
