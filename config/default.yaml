project: private-os
language: it
safe_mode: true
database: data/private_os.sqlite
runtime:
  state_root: ~/.private-os
  data_dir: ~/.private-os/data
  memory_dir: ~/.private-os/memory
  logs_dir: ~/.private-os/logs
  workspace_dir: ~/.private-os/workspace
separation:
  forbidden_contexts:
    - business repositories
    - business credentials
    - production systems
    - production credentials
  default_scope: private_life
user_style:
  language: Italian
  tone: direct, practical, concise
