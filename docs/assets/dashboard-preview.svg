<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">VitaDex dashboard preview</title>
  <desc id="desc">A stylized preview of the VitaDex local dashboard with tasks, approvals, memory, and follow-ups.</desc>
  <rect width="1200" height="720" fill="#f7f8fb"/>
  <rect x="48" y="40" width="1104" height="640" rx="8" fill="#ffffff" stroke="#d7dce5"/>
  <rect x="48" y="40" width="1104" height="72" rx="8" fill="#1f2937"/>
  <text x="84" y="86" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="700">VitaDex</text>
  <text x="214" y="86" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">local personal OS, safe by default</text>
  <rect x="940" y="62" width="168" height="28" rx="4" fill="#0f766e"/>
  <text x="964" y="82" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="700">READ-ONLY MODE</text>

  <text x="84" y="154" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">Operational dashboard</text>
  <text x="84" y="184" fill="#4b5563" font-family="Arial, sans-serif" font-size="15">Synthetic preview data. Real memory and tasks stay in the untracked local runtime.</text>

  <g>
    <rect x="84" y="220" width="312" height="180" rx="8" fill="#ffffff" stroke="#d7dce5"/>
    <text x="108" y="256" fill="#111827" font-family="Arial, sans-serif" font-size="17" font-weight="700">Active tasks</text>
    <rect x="108" y="282" width="248" height="14" rx="3" fill="#2563eb"/>
    <rect x="108" y="310" width="190" height="12" rx="3" fill="#dbeafe"/>
    <rect x="108" y="340" width="226" height="14" rx="3" fill="#0f766e"/>
    <rect x="108" y="368" width="160" height="12" rx="3" fill="#ccfbf1"/>
  </g>

  <g>
    <rect x="444" y="220" width="312" height="180" rx="8" fill="#ffffff" stroke="#d7dce5"/>
    <text x="468" y="256" fill="#111827" font-family="Arial, sans-serif" font-size="17" font-weight="700">Approvals</text>
    <rect x="468" y="282" width="112" height="28" rx="4" fill="#f59e0b"/>
    <text x="486" y="301" fill="#111827" font-family="Arial, sans-serif" font-size="13" font-weight="700">PENDING</text>
    <rect x="468" y="330" width="240" height="12" rx="3" fill="#fde68a"/>
    <rect x="468" y="358" width="174" height="12" rx="3" fill="#fef3c7"/>
  </g>

  <g>
    <rect x="804" y="220" width="312" height="180" rx="8" fill="#ffffff" stroke="#d7dce5"/>
    <text x="828" y="256" fill="#111827" font-family="Arial, sans-serif" font-size="17" font-weight="700">Memory</text>
    <rect x="828" y="282" width="248" height="14" rx="3" fill="#7c3aed"/>
    <rect x="828" y="312" width="202" height="12" rx="3" fill="#ede9fe"/>
    <rect x="828" y="342" width="226" height="12" rx="3" fill="#ede9fe"/>
    <rect x="828" y="372" width="148" height="12" rx="3" fill="#ede9fe"/>
  </g>

  <g>
    <rect x="84" y="448" width="492" height="156" rx="8" fill="#ffffff" stroke="#d7dce5"/>
    <text x="108" y="484" fill="#111827" font-family="Arial, sans-serif" font-size="17" font-weight="700">Follow-ups</text>
    <circle cx="120" cy="526" r="7" fill="#0f766e"/>
    <rect x="140" y="518" width="360" height="14" rx="3" fill="#ccfbf1"/>
    <circle cx="120" cy="562" r="7" fill="#2563eb"/>
    <rect x="140" y="554" width="280" height="14" rx="3" fill="#dbeafe"/>
  </g>

  <g>
    <rect x="624" y="448" width="492" height="156" rx="8" fill="#ffffff" stroke="#d7dce5"/>
    <text x="648" y="484" fill="#111827" font-family="Arial, sans-serif" font-size="17" font-weight="700">Knowledge hub</text>
    <rect x="648" y="512" width="112" height="28" rx="4" fill="#e5e7eb"/>
    <text x="672" y="531" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="700">PUBLIC</text>
    <rect x="780" y="512" width="126" height="28" rx="4" fill="#e0f2fe"/>
    <text x="806" y="531" fill="#075985" font-family="Arial, sans-serif" font-size="13" font-weight="700">LOCAL</text>
    <rect x="648" y="562" width="372" height="12" rx="3" fill="#e5e7eb"/>
  </g>
