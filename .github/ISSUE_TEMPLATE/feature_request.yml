name: Feature request
description: Propose an improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which operational problem do you want to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Desired solution
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety impact
      description: Explain how the proposal respects safe mode, approvals, and public-local separation
