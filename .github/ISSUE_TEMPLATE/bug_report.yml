name: Bug report
description: Report a reproducible issue
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Description
      description: What happened and what you expected
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, commit, or release
  - type: textarea
    id: privacy
    attributes:
      label: Privacy check
      description: Confirm that you removed personal data, secrets, and sensitive paths
    validations:
      required: true
