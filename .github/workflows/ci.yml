name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy vitadex
      - name: Pytest
        run: pytest
      - name: Detect secrets audit
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard-web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run check
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
