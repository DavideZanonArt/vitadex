followups:
  - title: Follow up with the contact with no reply
    due_in_days: 3
    trigger_condition: No reply after 3 days
    action: Prepare a follow-up email
    approval_required: true
  - title: Confirm budget and dates
    due_in_days: 1
    trigger_condition: Budget or dates are missing
    action: Ask the user for a decision
    approval_required: false
