task_id: task_example_munich_housing_6_months
objective: Find a temporary housing option for 6 months.
known_context:
  - Well-connected area with reasonable travel times.
assumptions:
  - Furnished apartment.
  - Research in safe mode, without live browsing.
missing_info:
  - Maximum monthly budget.
  - Exact dates.
  - Number of people.
risks:
  - Scams.
  - Unverified deposits.
  - Contracts that are not suitable for 6 months.
recommended_strategy: Prepare multi-source research, a comparison table, EN contact drafts, and follow-ups.
required_skills:
  - housing_search
  - email_followup
  - decision_matrix
required_tools:
  - BrowserTool(mock)
  - GmailTool(draft)
approval_points:
  - action_type: send_message
    title: Send demo availability request
expected_outputs:
  - Shortlist
  - Recommendation
